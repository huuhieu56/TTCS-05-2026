services:
  # ============================================================
  # Data Infrastructure
  # ============================================================

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: ttcs-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.9
    container_name: ttcs-clickhouse
    env_file:
      - .env
    ports:
      - "8124:8123"
      - "9003:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  source-db:
    image: postgres:16-alpine
    container_name: ttcs-source-db
    environment:
      POSTGRES_DB: ${SOURCE_PG_DB:-ecommerce}
      POSTGRES_USER: ${SOURCE_PG_USER:-source_user}
      POSTGRES_PASSWORD: ${SOURCE_PG_PASSWORD:-source_pass}
    ports:
      - "5434:5432"
    volumes:
      - source_pg_data:/var/lib/postgresql/data
      - ./source-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_PG_USER:-source_user} -d ${SOURCE_PG_DB:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5

  source-api:
    build: ./source-api
    container_name: ttcs-source-api
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Processing
  # ============================================================

  spark:
    image: apache/spark:3.5.3
    container_name: ttcs-spark
    command: ["/bin/bash", "-lc", "sleep infinity"]
    env_file:
      - .env
    ports:
      - "4041:4040"
      - "8081:8080"
    volumes:
      - ../pipelines:/workspace/pipelines
      - ../warehouse:/workspace/warehouse
      - ../configs:/workspace/configs
      - ../data_source:/workspace/data_source
    depends_on:
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      source-db:
        condition: service_healthy
      source-api:
        condition: service_healthy

  # ============================================================
  # Visualization
  # ============================================================

  streamlit:
    image: python:3.11.10-slim
    container_name: ttcs-streamlit
    working_dir: /workspace
    command: sh -c "pip install --no-cache-dir -r requirements.txt && streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true"
    env_file:
      - .env
    ports:
      - "8502:8501"
    volumes:
      - ../apps/streamlit:/workspace
    depends_on:
      clickhouse:
        condition: service_healthy

  # ============================================================
  # Airflow Orchestration
  # ============================================================

  airflow-metadata:
    image: postgres:16-alpine
    container_name: ttcs-airflow-metadata
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build: ./airflow
    container_name: ttcs-airflow-init
    entrypoint: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@ttcs.local || true"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    depends_on:
      airflow-metadata:
        condition: service_healthy

  airflow-webserver:
    build: ./airflow
    container_name: ttcs-airflow-webserver
    user: root
    command: >
      bash -c "
        chmod -R 777 /opt/airflow/data_source 2>/dev/null || true &&
        airflow webserver --port 8082
      "
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: 8082
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-ttcs-raw}
      MINIO_BUCKET_CLEAN: ${MINIO_BUCKET_CLEAN:-ttcs-clean}
      MINIO_BUCKET_SERVING: ${MINIO_BUCKET_SERVING:-ttcs-serving}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ttcs}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ttcs}
      SOURCE_PG_HOST: source-db
      SOURCE_PG_PORT: ${SOURCE_PG_PORT:-5432}
      SOURCE_PG_DB: ${SOURCE_PG_DB:-ecommerce}
      SOURCE_PG_USER: ${SOURCE_PG_USER:-source_user}
      SOURCE_PG_PASSWORD: ${SOURCE_PG_PASSWORD:-source_pass}
      SOURCE_API_URL: http://source-api:8000
      SPARK_MASTER: local[*]
    ports:
      - "8082:8082"
    volumes: &airflow-common-volumes
      - ../dags:/opt/airflow/dags
      - ../pipelines:/opt/airflow/pipelines
      - ../generate_fake_data:/opt/airflow/generate_fake_data
      - ../warehouse:/opt/airflow/warehouse
      - ../configs:/opt/airflow/configs
      - ../data_source:/opt/airflow/data_source
      - ../sample_data:/opt/airflow/sample_data
      - airflow_logs:/opt/airflow/logs
    depends_on: &airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      source-db:
        condition: service_healthy
      source-api:
        condition: service_healthy

  airflow-scheduler:
    build: ./airflow
    container_name: ttcs-airflow-scheduler
    user: root
    command: >
      bash -c "
        chmod -R 777 /opt/airflow/data_source 2>/dev/null || true &&
        airflow scheduler
      "
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: 8080  # not used but override the anchor
    volumes: *airflow-common-volumes
    depends_on: *airflow-common-depends

volumes:
  minio_data:
  clickhouse_data:
  source_pg_data:
  airflow_pg_data:
  airflow_logs:
